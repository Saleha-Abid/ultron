vrrp_instance VI_1 {
    state BACKUP
    interface enp0s31f6
    virtual_router_id 51
    priority 50              # Lower priority
    advert_int 1
    nopreempt                # Optional: prevents "flip-flopping"

    virtual_ipaddress {
        192.168.24.100
    }

    notify_master "/etc/keepalived/scripts/go_primary.sh"
    notify_backup "/etc/keepalived/scripts/go_secondary.sh"
}

