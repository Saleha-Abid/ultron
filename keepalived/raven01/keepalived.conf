vrrp_instance VI_1 {
    state MASTER
    interface enp0s31f6           # Change to your actual interface name (check 'ip a')
    virtual_router_id 51
    priority 100             # Higher priority wins
    advert_int 1
    
    virtual_ipaddress {
        192.168.24.100       # This is the VIP workers will use
    }

    notify_master "/etc/keepalived/scripts/go_primary.sh"
    notify_backup "/etc/keepalived/scripts/go_secondary.sh"
}

