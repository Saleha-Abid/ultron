# slurmdbd.conf - Slurm Database Daemon Configuration
# Managed by admin for ultron cluster (NUST CAE)

# --- AUTHENTICATION ---
# Use Munge for the secret handshake between Slurm components
AuthType=auth/munge

# --- DATABASE CONNECTION ---
# Using MariaDB (MySQL Plugin)
StorageType=accounting_storage/mysql
StorageHost=localhost
StoragePort=3306
StorageUser=slurm
StoragePass=your_secure_password
StorageLoc=slurm_acct_db

# --- DAEMON CONFIGURATION ---
DbdHost=head01
DbdPort=6819
SlurmUser=slurm

# --- LOGGING ---
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurm/slurmdbd.pid
DebugLevel=info

# --- ARCHIVING (Keeps the DB from getting too huge) ---
ArchiveEvents=yes
ArchiveJobs=yes
ArchiveSteps=no
ArchiveSuspend=no
# Purge logs after 12 months to save space on your 1.6TB HDD
PurgeEventAfter=12months
PurgeJobAfter=12months
