# You can find an example in  /usr/share/doc/drbd.../drbd.conf.example

include "drbd.d/global_common.conf";
include "drbd.d/*.res";

resource r0 {
    protocol C;
    startup {
        wfc-timeout  15;
        degr-wfc-timeout 60;
    }
    net {
        # This shared secret ensures only your two nodes can sync
        shared-secret "ultron-secure-sync";
    }
    on raven01 {
        device    /dev/drbd0;
        disk      /dev/sda1;
        address   192.168.24.121:7788;
        meta-disk internal;
    }
    on raven02 {
        device    /dev/drbd0;
        disk      /dev/sda1;
        address   192.168.24.122:7788;
        meta-disk internal;
    }
}

