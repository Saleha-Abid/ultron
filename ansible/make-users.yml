---
- name: Directed SSH Trust for Ultron Cluster
  hosts: all
  become: yes
  vars:
    cluster_users:
      - username: "Ayesha"
        uid: 2000
        password: "$6$jGtlAmBX.kRnSQXn$H5P5i9.lJOnOl1LK3piGbWnzZ4E.5GxOYJ.SelUGNHMDL02uyagyYSSw/k9pHona1grrYpTJpEBXuAuy0jRbm1"
    # Define your groups clearly
    head_nodes: ["head01", "head02"]
    compute_nodes: ["node01", "node02"]

  tasks:
    - name: Ensure group and users exist (with keys)
      user:
        name: "{{ item.username }}"
        uid: "{{ item.uid }}"
        group: users
        password: '{{ item.password }}'
        shell: /bin/bash
        create_home: yes
        update_password: on_create
        generate_ssh_key: yes
        ssh_key_type: ed25519
      loop: "{{ cluster_users }}"

    - name: Create /data and /scratch directories with 755 permissions
      file:
        path: "{{ item[1] }}/{{ item[0].username }}"
        state: directory
        owner: "{{ item[0].username }}"
        group: users
        mode: '0755'
      with_nested:
        - "{{ cluster_users }}"
        - [ '/data', '/scratch' ]

    - name: Setup Folders and Disable Host Key Prompts
      copy:
        dest: "/home/{{ item.username }}/.ssh/config"
        content: "Host *\n    StrictHostKeyChecking no\n    UserKnownHostsFile /dev/null"
        owner: "{{ item.username }}"
        group: users
        mode: '0600'
      loop: "{{ cluster_users }}"

    - name: Slurp keys from all nodes
      shell: "cat /home/{{ item.username }}/.ssh/id_ed25519.pub"
      register: slurped_keys
      loop: "{{ cluster_users }}"
      changed_when: false

    # --- DIRECTED TRUST LOGIC ---

    - name: "HEADS -> COMPUTES: Deploy Head keys to Compute nodes"
      authorized_key:
        user: "{{ item.0.username }}"
        key: "{{ hostvars[item.1]['slurped_keys']['results'][0]['stdout'] }}"
      when: inventory_hostname in compute_nodes
      with_nested:
        - "{{ cluster_users }}"
        - "{{ head_nodes }}"

    - name: "COMPUTES -> HEADS: Deploy Compute keys to Head nodes"
      authorized_key:
        user: "{{ item.0.username }}"
        key: "{{ hostvars[item.1]['slurped_keys']['results'][0]['stdout'] }}"
      when: inventory_hostname in head_nodes
      with_nested:
        - "{{ cluster_users }}"
        - "{{ compute_nodes }}"

